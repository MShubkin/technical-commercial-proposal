app_name: technical-commercial-proposal
image_name: docker-asez.rc.inlinegroup.ru/monorepo/technical-commercial-proposal
# image_tag: via command
# namespace: via command
replicas: 1
init_delay: 5
cpu_lim: 100m
mem_lim: 100Mi

health_check:
  enabled: true
  path: "/monitoring/test"

command:
  enabled: false
  command:  ' "/bin/bash", "-c", "--" '
  args: "while true; do sleep 3600; done;"

image_pull_secret:
  name: "docker-registry"
  # data: via command

env:
  ENABLE_LOGGER: "true"
  LOGGER_MODE: "2"
  LOGGER_DIR: "logs"
  LOGGER_FILE: "log.cef"
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  RABBITMQ_RETRIES: "10"
  RABBITMQ_INTERVAL_MS: "100"
  SRV_PORT: "80"
  SRV_HOST: "0.0.0.0"
  RUST_LOG: "info"
  POSTGRES_VHOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "asez_dbtkp"
  POSTGRES_MIN_CONNECTIONS: "1"
  POSTGRES_MAX_CONNECTIONS: "4"
  POSTGRES_TIMEOUT_S: "10"
  POSTGRES_CONNECTION_REFRESH_S: "3600"
  AUTH_WITHOUT_COOKIE: "true"
  MONOLITH_BASE_URL: "https://rcstagestand.inlinegroup.ru:8443"
  MONOLITH_TECH_USER_ID: "10200"

secret:
  RABBITMQ_USERNAME: "guest"
  RABBITMQ_PASSWORD: "guest"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "test123"

ingress:
  enabled: false
